<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fatu | Panel de administración</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

    <header>
        <img src="assets/img/fatuSinFondo.png" alt="Fatu Delicias y Sabores" class="logo">
        <div class="header-texto">
            <h1>Panel de administración</h1>
        </div>
    </header>

    <main>

        <!-- Se muestra si NO está logueado -->
        <section id="seccion-login" class="admin-caja">
            <h2>Iniciar sesión</h2>

            <div class="campo">
                <label for="adminEmail">Email</label>
                <input type="email" id="adminEmail" placeholder="tu@email.com">
            </div>

            <div class="campo">
                <label for="adminPassword">Contraseña</label>
                <input type="password" id="adminPassword" placeholder="Tu contraseña">
            </div>

            <button id="btn-login" class="btn-primario-admin">Ingresar</button>
        </section>

        <!-- Se muestra si SÍ está logueado (arranca oculto) -->
        <section id="seccion-panel" class="admin-caja oculto">
            <div class="admin-header-panel">
                <h2>Panel de productos</h2>
                <button id="btn-logout" class="btn-secundario-admin">Cerrar sesión</button>
            </div>

            <button id="btn-agregar-producto" class="btn-agregar-producto">+ Agregar producto nuevo</button>

            <input type="text" id="buscador-admin" class="buscador-admin" placeholder="🔍 Buscar producto por nombre...">
            <div id="lista-productos-admin" class="lista-productos-admin"></div>
        </section>

    </main>


    <div id="modal-aviso" class="modal-overlay oculto">
        <div class="modal-caja">
            <p id="modal-aviso-texto"></p>
            <button id="modal-aviso-btn">Entendido</button>
        </div>
    </div>
    <div id="modal-eliminar" class="modal-overlay oculto">
        <div class="modal-caja">
            <p id="modal-eliminar-texto"></p>
            <div class="botones-confirmacion">
                <button id="btn-cancelar-eliminar" class="btn-secundario">Cancelar</button>
                <button id="btn-confirmar-eliminar" class="btn-peligro">Sí, eliminar</button>
            </div>
        </div>
    </div>
    

    <script src="js/productos.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/avisos.js"></script>
    <script src="js/admin.js"></script>

</body>
</html>
